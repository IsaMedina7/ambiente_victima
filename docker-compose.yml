version: '3.8'

networks:
  flat_net:
    ipam:
      config:
        - subnet: 10.9.0.0/24

services:

  victima_apache:
    image: httpd:2.4-alpine
    container_name: victima_apache
    networks:
      flat_net:
        ipv4_address: 10.9.0.10
    ports:
      - "8080:80"   # Ahora sí es accesible directamente
    volumes:
      - ./html:/usr/local/apache2/htdocs/
      - ./my_httpd.conf:/usr/local/apache2/conf/httpd.conf
      - ./apache_config/httpd-info.conf:/usr/local/apache2/conf/extra/httpd-info.conf

  gaia_ids_app:
    build:
      context: .
      dockerfile: Dockerfile.app
    image: gaia_ids_app_local
    container_name: gaia_ids_app
    volumes:
      - ./flask_app_tesis:/app
    working_dir: /app
    networks:
      flat_net:
        ipv4_address: 10.9.0.50
    ports:
      - "5000:5000"
    command: >
      sh -c "python app.py || 
             tail -f /dev/null"

  # Sniffer pegado a la víctima (ve TODO el tráfico que llega)
  sniffer:
    build: 
      context: .
      dockerfile: Dockerfile.sniffer
    container_name: sniffer
    privileged: true
    cap_add:
      - NET_RAW
      - NET_ADMIN
    network_mode: "service:victima_apache"
    volumes:
      - ./flask_app_tesis:/capturas
    restart: always
    environment:
      - PREFIX=FLAT
