<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GAIA | Infrastructure Monitor</title>
  <style>
    :root {
      --color: #00d4ff;
      --bg: #050508;
      --brillo: rgba(0, 212, 255, 0.5);
      --frecuencia: 1.5s;
      --desvio: 0px;
    }

    body {
      background-color: var(--bg);
      color: var(--color);
      font-family: 'Courier New', Courier, monospace;
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow-y: auto;
      overflow-x: hidden;
      transition: background-color 0.4s, color 0.4s;
      padding: 20px;
      box-sizing: border-box;
    }

    /* Dynamic Grid Background */
    .grid {
      position: fixed;
      width: 200vw;
      height: 200vh;
      background-image: linear-gradient(var(--color) 1px, transparent 1px),
        linear-gradient(90deg, var(--color) 1px, transparent 1px);
      background-size: 40px 40px;
      transform: perspective(500px) rotateX(60deg);
      bottom: -60%;
      left: -50%;
      opacity: 0.1;
      z-index: -1;
      pointer-events: none;
    }

    .main-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 30px;
      /* Espacio garantizado entre el círculo y el panel */
      width: 100%;
    }

    /* Core Pulse Node */
    #core {
      width: min(220px, 50vw);
      height: min(220px, 50vw);
      min-width: 120px;
      min-height: 120px;
      border: 5px solid var(--color);
      border-radius: 50%;
      padding: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 30px var(--brillo);
      animation: pálpito var(--frecuencia) infinite ease-in-out;
      transform: translate(var(--desvio), var(--desvio));
      background: rgba(0, 0, 0, 0.6);
      flex-shrink: 0;
      /* Evita que el círculo se aplaste */
    }

    #core h1 {
      font-size: clamp(1.8rem, 10vw, 3rem);
      letter-spacing: 5px;
      transition: 0.1s;
      margin: 0;
      text-shadow: 0 0 10px var(--color);
    }

    @keyframes pálpito {

      0%,
      100% {
        transform: scale(1) translate(var(--desvio), var(--desvio));
        opacity: 0.8;
      }

      50% {
        transform: scale(1.1) translate(calc(var(--desvio) * -1), var(--desvio));
        opacity: 1;
      }
    }

    /* Responsive Data Panel */
    .data-panel {
      margin-top: 40px;
      padding: 20px;
      border: 1px solid var(--color);
      text-align: center;
      background: rgba(0, 0, 0, 0.85);
      width: 100%;
      max-width: 350px;
      transition: 0.5s;
      box-sizing: border-box;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }

    .data-panel div {
      margin: 8px 0;
      font-size: clamp(0.85rem, 3vw, 1rem);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .stat-label {
      opacity: 0.7;
    }

    .stat-value {
      font-weight: bold;
      color: #fff;
    }

    /* Scanline Overlay */
    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: repeating-linear-gradient(0deg, rgba(255, 255, 255, 0.03) 0px, rgba(255, 255, 255, 0.03) 1px, transparent 1px, transparent 2px);
      pointer-events: none;
      z-index: 5;
    }
  </style>
</head>

<body>
  <div class="overlay"></div>
  <div class="grid"></div>
  <div class="main-container">
    <div id="core">
      <h1 id="tag">GAIA</h1>
    </div>

    <div class="data-panel">
      <div>
        <span class="stat-label">Latency:</span> <span id="val" class="stat-value">0ms</span>
        <span style="margin: 0 10px; opacity: 0.3;">|</span>
        <span class="stat-label">Active:</span> <span id="conns" class="stat-value">0</span>
      </div>
      <div id="status" style="margin-top:15px; font-weight:bold; font-size: 1.1rem;">STATUS: OPTIMAL</div>
    </div>
  </div>
  <script>
    const tag = document.getElementById('tag');
const status = document.getElementById('status');
const val = document.getElementById('val');
const connsDisp = document.getElementById('conns');

// AbortController para evitar que las peticiones se amontonen si el servidor tarda
let controller;

async function updateMonitor() {
  if (controller) controller.abort(); 
  controller = new AbortController();

  const startTime = Date.now();
  
  try {
    // 1. Añadimos un timeout real a la petición
    const timeoutId = setTimeout(() => controller.abort(), 2000);

    const res = await fetch('/server-status?auto', {
      cache: 'no-store',
      signal: controller.signal
    });
    
    clearTimeout(timeoutId);
    if (!res.ok) throw new Error();

    const text = await res.text();
    const rtt = Date.now() - startTime;

    // 2. Extracción más robusta de BusyWorkers
    const busyMatch = text.match(/BusyWorkers:\s(\d+)/);
    const currentConns = busyMatch ? parseInt(busyMatch[1]) : 0;

    renderUI(rtt, currentConns);
  } catch (e) {
    if (e.name !== 'AbortError') {
      renderUI(3000, 999); // Error de conexión
    }
  } finally {
    // 3. RECURSIÓN SEGURA: Solo programa la siguiente ejecución 
    // DESPUÉS de que esta haya terminado o fallado.
    setTimeout(updateMonitor, 2000); // Aumentamos a 2s para reducir ruido en el pcap
  }
}

function renderUI(ms, conns) {
  val.innerText = `${ms}ms`;
  connsDisp.innerText = conns;

  let hue, freq, dev, st, txt, bg;


  // Ajuste de umbrales para evitar falsos positivos por ruido doméstico
  if (ms < 100 && conns < 15) { // Más tolerancia para red de hogar
    hue = 190; freq = "1.5s"; dev = "0px";
    st = "STATUS: OPTIMAL"; txt = "GAIA"; bg = "#050508";
  } else if (ms < 500 && conns < 100) {
    hue = 280; freq = "0.6s"; dev = "4px";
    st = "STATUS: UNSTABLE TRAFFIC"; txt = "G_A_I_A"; bg = "#0a0510";
  } else {
    hue = 0; freq = "0.1s"; dev = "12px";
    st = "STATUS: CRITICAL FAILURE"; txt = "VOID_ERR"; bg = "#150505";
  }

  const root = document.documentElement;
  root.style.setProperty('--color', `hsl(${hue}, 100%, 50%)`);
  root.style.setProperty('--brillo', `hsl(${hue}, 100%, 40%)`);
  root.style.setProperty('--frecuencia', freq);
  root.style.setProperty('--desvio', dev);
  root.style.setProperty('--bg', bg);

  tag.innerText = txt;
  status.innerText = st;
}

updateMonitor();
  </script>
</body>

</html>
